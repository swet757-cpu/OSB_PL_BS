<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Compact Weekly Planner</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <header class="panel header">
      <div class="title-wrap">
        <p class="kicker">Compact Planner</p>
        <h1>Недельный календарь</h1>
      </div>

      <div class="nav-wrap">
        <div class="week-nav">
          <button id="prevWeek" class="ghost-btn" type="button">←</button>
          <button id="todayWeek" class="accent-btn" type="button">Сегодня</button>
          <button id="nextWeek" class="ghost-btn" type="button">→</button>
        </div>
        <p id="weekRange" class="week-range"></p>
      </div>

      <aside class="stats-mini" aria-label="Статистика выполнения">
        <div class="stats-row">
          <strong id="statsPercent">0%</strong>
          <span id="statsMeta">0 из 0</span>
        </div>
        <div class="mini-bar"><div id="statsFill" class="mini-fill"></div></div>
        <div class="chips">
          <span id="chipTodo" class="chip todo">Не начато: 0</span>
          <span id="chipProgress" class="chip progress">В процессе: 0</span>
          <span id="chipDone" class="chip done">Выполнено: 0</span>
        </div>
      </aside>
    </header>

    <section class="panel quick-add">
      <form id="taskForm" class="task-form">
        <input id="taskTitle" type="text" maxlength="120" placeholder="Новая задача" required />
        <select id="taskDay" required></select>
        <select id="taskStatus" required>
          <option value="todo">Не начато</option>
          <option value="inprogress">В процессе</option>
          <option value="done">Выполнено</option>
        </select>
        <input id="taskColor" type="color" value="#3f8cff" />
        <label class="repeat-toggle">
          <input id="taskRepeat" type="checkbox" />
          <span>Еженедельно</span>
        </label>
        <button class="accent-btn add-btn" type="submit">Добавить</button>
      </form>
      <p id="formMessage" class="form-message" aria-live="polite"></p>
    </section>

    <section class="panel board-wrap">
      <div id="weekBoard" class="week-board" aria-label="Неделя"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
