<style>
  :root {
    --bg: #f6f7f9;
    --panel: #ffffff;
    --soft: #f0f2f5;
    --line: #e1e5eb;
    --text: #17202a;
    --muted: #6b7785;
    --accent: #f97316;
    --accent-soft: #fff2e8;
    --green: #16a34a;
    --red: #dc2626;
    --blue: #2563eb;
    --yellow: #eab308;
    --shadow: 0 18px 45px rgba(17, 24, 39, 0.08);
    font-family: Inter, "Segoe UI", Arial, sans-serif;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
  }

  button,
  input,
  select,
  textarea {
    font: inherit;
  }

  button {
    cursor: pointer;
  }

  .app-shell {
    display: grid;
    grid-template-columns: 240px minmax(0, 1fr);
    min-height: 100vh;
  }

  .sidebar {
    position: sticky;
    top: 0;
    height: 100vh;
    padding: 20px 16px;
    border-right: 1px solid var(--line);
    background: #fff;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 24px;
  }

  .logo span {
    display: grid;
    place-items: center;
    width: 40px;
    height: 40px;
    border-radius: 12px;
    background: var(--accent);
    color: #fff;
    font-weight: 800;
  }

  .logo strong,
  .logo small {
    display: block;
  }

  .logo strong {
    font-size: 14px;
    letter-spacing: 0;
  }

  .logo small {
    margin-top: 2px;
    color: var(--muted);
    font-size: 12px;
  }

  .nav {
    display: grid;
    gap: 8px;
  }

  .nav-item {
    width: 100%;
    min-height: 42px;
    border: 0;
    border-radius: 12px;
    background: transparent;
    color: var(--muted);
    text-align: left;
    padding: 0 14px;
    font-weight: 700;
  }

  .nav-item.active,
  .nav-item:hover {
    background: var(--accent-soft);
    color: var(--accent);
  }

  .main {
    min-width: 0;
    padding: 20px;
  }

  .topbar {
    display: grid;
    grid-template-columns: minmax(220px, 0.8fr) minmax(0, 2fr);
    gap: 18px;
    align-items: end;
    margin-bottom: 12px;
  }

  .eyebrow {
    margin: 0 0 4px;
    color: var(--muted);
    font-size: 13px;
  }

  h1,
  h2,
  p {
    margin-top: 0;
  }

  h1 {
    margin-bottom: 0;
    font-size: 28px;
    letter-spacing: 0;
  }

  h2 {
    margin-bottom: 0;
    font-size: 16px;
    letter-spacing: 0;
  }

  .filters {
    display: grid;
    grid-template-columns: repeat(4, minmax(120px, 1fr)) auto;
    gap: 10px;
    align-items: end;
  }

  label {
    display: grid;
    gap: 5px;
    color: var(--muted);
    font-size: 12px;
    font-weight: 700;
  }

  input,
  select,
  textarea {
    width: 100%;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: #fff;
    color: var(--text);
    min-height: 40px;
    padding: 8px 10px;
    outline: none;
  }

  textarea {
    resize: vertical;
  }

  input:focus,
  select:focus,
  textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.13);
  }

  .primary-button {
    min-height: 40px;
    border: 0;
    border-radius: 10px;
    background: var(--accent);
    color: #fff;
    padding: 0 16px;
    font-weight: 800;
    white-space: nowrap;
  }

  .primary-button:disabled {
    opacity: 0.6;
    cursor: progress;
  }

  .status-line {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 14px;
    color: var(--muted);
    font-size: 13px;
  }

  .status-line.error {
    color: var(--red);
  }

  .view {
    display: none;
  }

  .view.active {
    display: block;
  }

  .cards-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 14px;
  }

  .metric-card,
  .panel {
    border: 1px solid var(--line);
    border-radius: 16px;
    background: var(--panel);
    box-shadow: var(--shadow);
  }

  .metric-card {
    padding: 16px;
  }

  .metric-card span {
    display: block;
    color: var(--muted);
    font-size: 13px;
    font-weight: 700;
  }

  .metric-card strong {
    display: block;
    margin-top: 8px;
    font-size: 24px;
    letter-spacing: 0;
  }

  .metric-card small {
    display: block;
    margin-top: 6px;
    color: var(--muted);
    font-size: 12px;
  }

  .charts-grid,
  .analytics-grid,
  .notes-layout {
    display: grid;
    gap: 14px;
  }

  .charts-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .analytics-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .notes-layout {
    grid-template-columns: 360px minmax(0, 1fr);
  }

  .panel {
    padding: 16px;
    min-width: 0;
  }

  .chart-panel {
    min-height: 340px;
  }

  .chart-panel header,
  .panel header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .chart-panel canvas {
    width: 100%;
    max-height: 280px;
  }

  .wide {
    grid-column: 1 / -1;
  }

  .note-form {
    display: grid;
    gap: 12px;
  }

  .notes-list {
    display: grid;
    gap: 10px;
  }

  .note-item {
    border: 1px solid var(--line);
    border-radius: 12px;
    background: var(--soft);
    padding: 12px;
  }

  .note-item header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    margin-bottom: 8px;
    color: var(--muted);
    font-size: 12px;
  }

  .note-item strong {
    color: var(--accent);
  }

  .note-item p {
    margin: 0;
    line-height: 1.45;
  }

  .empty-state {
    border: 1px dashed var(--line);
    border-radius: 14px;
    background: #fff;
    color: var(--muted);
    padding: 22px;
    text-align: center;
  }

  @media (max-width: 1180px) {
    .app-shell {
      grid-template-columns: 1fr;
    }

    .sidebar {
      position: static;
      height: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
    }

    .logo {
      margin-bottom: 0;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
    }

    .topbar,
    .charts-grid,
    .analytics-grid,
    .notes-layout {
      grid-template-columns: 1fr;
    }

    .filters {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }

  @media (max-width: 720px) {
    .main {
      padding: 12px;
    }

    .sidebar {
      align-items: flex-start;
      flex-direction: column;
    }

    .filters,
    .cards-grid {
      grid-template-columns: 1fr;
    }

    h1 {
      font-size: 23px;
    }
  }
</style>
